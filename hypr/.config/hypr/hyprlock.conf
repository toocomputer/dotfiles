general {
    ignore_empty_input = true
}

background {
    monitor =
    color = rgba(17, 17, 27, 0.85)
    path = ~/wallpapers/amethyst/amethyst1.jpg

    blur_passes = 4
    blur_size = 12
    noise = 0.0117
    contrast = 0.85
    brightness = 0.6
    vibrancy = 0.25
    vibrancy_darkness = 0.15
}

animations {
    enabled = true
}

# ── Greeting ──
label {
    monitor =
    text = cmd[update:3600] echo "Good $(h=$(date +%H); if [ $h -lt 12 ]; then echo morning; elif [ $h -lt 17 ]; then echo afternoon; else echo evening; fi)"
    color = rgba(203, 166, 247, 0.5)
    font_size = 14
    font_family = JetBrainsMono Nerd Font Mono
    position = 0, 250
    halign = center
    valign = center
}

# ── Clock ──
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%I:%M")</span>"
    color = rgba(205, 214, 244, 0.7)
    font_size = 160
    font_family = Steelfish Outline
    position = 0, 120
    halign = center
    valign = center
}

# ── AM/PM ──
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%p')"
    color = rgba(205, 214, 244, 0.45)
    font_size = 36
    font_family = JetBrainsMono Nerd Font Mono
    position = 230, 108
    halign = center
    valign = center
}

# ── Date ──
label {
    monitor =
    text = cmd[update:3600] echo "$(date +'%A, %B %d')"
    color = rgba(203, 166, 247, 0.75)
    font_size = 17
    font_family = JetBrainsMono Nerd Font Mono
    position = 0, -60
    halign = center
    valign = center
}

# ── Decorative line ──
label {
    monitor =
    text = ─── ✦ ───
    color = rgba(203, 166, 247, 0.18)
    font_size = 13
    font_family = JetBrainsMono Nerd Font Mono
    position = 0, -90
    halign = center
    valign = center
}

# ── Input field ──
input-field {
    monitor =
    size = 400, 60
    position = 0, -170
    halign = center
    valign = center

    inner_color = rgba(17, 17, 27, 0.6)
    outer_color = rgba(203, 166, 247, 0.5)
    outline_thickness = 1

    font_family = JetBrainsMono Nerd Font Mono
    font_color = rgba(205, 214, 244, 1.0)

    placeholder_text = <i>Password</i>
    dots_center = true
    dots_spacing = 0.5
    dots_size = 0.15

    check_color = rgba(166, 227, 161, 0.8)
    fail_color = rgba(243, 139, 168, 0.9)
    fail_text = <i>✗ Wrong Password</i>
    capslock_color = rgba(249, 226, 175, 0.8)

    rounding = 20

    shadow_passes = 3
    shadow_size = 6
    shadow_color = rgba(0, 0, 0, 0.4)
    fade_on_empty = false
}

# ── Bottom hint ──
label {
    monitor =
    text = Press ↵  to unlock  ·  Esc to cancel
    color = rgba(205, 214, 244, 0.25)
    font_size = 11
    font_family = JetBrainsMono Nerd Font Mono
    position = 0, -240
    halign = center
    valign = center
}
